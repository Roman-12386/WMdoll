<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMdoll Official Store</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .catalog { display: flex; gap: 20px; flex-wrap: wrap; }
        .product { background: white; padding: 15px; border-radius: 10px; width: 250px; text-align: center; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        img { width: 100%; border-radius: 8px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; margin-top: 10px; cursor: pointer; border-radius: 5px; font-size: 16px; }
        button:hover { background: #218838; }
    </style>
    <!-- Подключение Foxy (ваша корзина) -->
    <link href="https://cdn.foxycart.com/wmdollofficial/loader.css" rel="stylesheet">
    <script src="https://cdn.foxycart.com/wmdollofficial/loader.js" async defer></script>
</head>
<body>
    <h1>WMdoll Official Store</h1>
    <div class="catalog">
        <div class="product">
            <img src="https://imgtolinkx.com/delete/uGSkA5gsfJUqYiiA2f_pFhu2GWqPHdKc"
            <h3>Premium Silicone Girl S135</h3>
            <p><strong>$2500 USD</strong></p >
            <!-- Форма добавления в корзину Foxy -->
            <form action="https://wmdollofficial.foxycart.com/cart" method="post" target="_blank">
                <input type="hidden" name="name" value="Premium Silicone Girl S135">
                <input type="hidden" name="price" value="2500">
                <input type="hidden" name="code" value="S35">
                <input type="hidden" name="parent_code" value="Premium Silicone">
                <!-- Ссылку на фото замените на реальную -->
                <input type="hidden" name="image" https://imgtolinkx.com/delete/uGSkA5gsfJUqYiiA2f_pFhu2GWqPHdKc>
                <button type="submit">Add to cart</button>
            </form>
        </div>
    </div>
</body>
</html>
